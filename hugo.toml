baseURL = 'https://esmoore.com/'
languageCode = 'en-us'
title = 'Eric S. Moore'

disableKinds = ["sitemap"]
ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.highlight]
    codeFences = true
    noClasses = false
    lineNos = false
    guessSyntax = false
  [markup.goldmark.renderer]
    unsafe= true
  [markup.goldmark.extensions]
    typographer = true
    [markup.goldmark.extensions.passthrough]
            enable = true
            [markup.goldmark.extensions.passthrough.delimiters]
              block = [['\[', '\]'], ['$$', '$$']]
              inline = [['\(', '\)']]
[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
  math = false

[taxonomies]
  
[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[security.funcs]
  getenv = ['^HUGO_', '^CI$', '^CF_PAGES_']
